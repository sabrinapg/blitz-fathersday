<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Checkmate Blitz</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet" />
<script src="https://cdnjs.cloudflare.com/ajax/libs/chess.js/0.10.3/chess.min.js"></script>
<style>
  :root {
    --cream: #FAF7F2;
    --ink: #1A1A18;
    --muted: #6B6860;
    --gold: #C8973A;
    --board-light: #F0D9B5;
    --board-dark: #B58863;
    --selected: #F6F669;
    --hint-green: #7FBF7F;
    --danger: #C0392B;
    --success: #2E7D32;
    --border: #E0DAD0;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Inter', sans-serif; background: var(--cream); color: var(--ink); min-height: 100vh; display: flex; flex-direction: column; align-items: center; }
  header { width: 100%; border-bottom: 1px solid var(--border); padding: 1.25rem 2rem; display: flex; align-items: baseline; gap: 12px; }
  header h1 { font-family: 'Playfair Display', serif; font-size: 1.6rem; letter-spacing: -0.5px; }
  header span { font-size: 0.8rem; color: var(--muted); letter-spacing: 0.08em; text-transform: uppercase; }
  .container { width: 100%; max-width: 920px; padding: 2rem 1.5rem; display: flex; gap: 2rem; align-items: flex-start; }
  .left { flex: 0 0 auto; display: flex; flex-direction: column; align-items: center; gap: 1rem; }
  #board { display: grid; grid-template-columns: repeat(8, 56px); grid-template-rows: repeat(8, 56px); border: 3px solid var(--ink); border-radius: 3px; overflow: hidden; width: 448px; height: 448px; }
  .sq { width: 56px; height: 56px; display: flex; align-items: center; justify-content: center; font-size: 34px; cursor: pointer; user-select: none; transition: filter 0.1s; line-height: 1; }
  .sq.light { background: var(--board-light); }
  .sq.dark  { background: var(--board-dark); }
  .sq.selected { outline: 4px solid var(--selected); outline-offset: -4px; }
  .sq.hint-sq  { outline: 4px solid var(--hint-green); outline-offset: -4px; }
  .sq:hover { filter: brightness(0.9); }
  .file-labels { display: grid; grid-template-columns: repeat(8, 56px); width: 448px; }
  .file-labels span { text-align: center; font-size: 11px; color: var(--muted); padding-top: 4px; letter-spacing: 0.05em; }
  #toast { width: 448px; min-height: 42px; background: var(--ink); color: var(--cream); border-radius: 6px; display: flex; align-items: center; justify-content: center; font-size: 14px; font-weight: 500; padding: 0 1rem; text-align: center; transition: background 0.2s; }
  #toast.good { background: var(--success); }
  #toast.bad  { background: var(--danger); }
  .btn-row { display: flex; gap: 8px; width: 448px; }
  .btn { flex: 1; padding: 9px 0; border: 1.5px solid var(--ink); border-radius: 5px; background: transparent; color: var(--ink); font-family: 'Inter', sans-serif; font-size: 13px; font-weight: 500; cursor: pointer; transition: background 0.15s, color 0.15s; }
  .btn:hover:not(:disabled) { background: var(--ink); color: var(--cream); }
  .btn:disabled { opacity: 0.35; cursor: default; }
  .btn.primary { background: var(--ink); color: var(--cream); }
  .btn.primary:hover:not(:disabled) { background: #333; }
  .right { flex: 1; min-width: 0; display: flex; flex-direction: column; gap: 1.25rem; }
  .stats-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
  .stat-card { background: #fff; border: 1px solid var(--border); border-radius: 8px; padding: 14px 16px; }
  .stat-card .label { font-size: 11px; text-transform: uppercase; letter-spacing: 0.08em; color: var(--muted); margin-bottom: 4px; }
  .stat-card .value { font-family: 'Playfair Display', serif; font-size: 2rem; line-height: 1; }
  .stat-card.time-card .value { color: var(--gold); }
  .timer-bar-wrap { height: 6px; background: var(--border); border-radius: 3px; overflow: hidden; }
  #timer-bar { height: 100%; background: var(--gold); border-radius: 3px; transition: width 0.25s linear, background 0.5s; width: 100%; }
  .section-title { font-family: 'Playfair Display', serif; font-size: 1.1rem; margin-bottom: 10px; padding-bottom: 6px; border-bottom: 1px solid var(--border); }
  .score-table { width: 100%; border-collapse: collapse; font-size: 13px; }
  .score-table th { text-align: left; font-size: 11px; letter-spacing: 0.06em; text-transform: uppercase; color: var(--muted); padding: 0 6px 8px; font-weight: 500; }
  .score-table th:last-child, .score-table td:last-child { text-align: right; }
  .score-table td { padding: 8px 6px; border-top: 1px solid var(--border); }
  .score-table tr.top td { font-weight: 600; }
  .score-table .empty { text-align: center; color: var(--muted); padding: 24px 6px; font-size: 13px; }
  .loading-row td { color: var(--muted); font-style: italic; }
  #modal-overlay { display: none; position: fixed; inset: 0; background: rgba(26,26,24,0.6); z-index: 100; align-items: center; justify-content: center; }
  #modal-overlay.show { display: flex; }
  .modal { background: var(--cream); border: 2px solid var(--ink); border-radius: 12px; padding: 2.5rem 2rem; max-width: 360px; width: 90%; text-align: center; }
  .modal h2 { font-family: 'Playfair Display', serif; font-size: 1.5rem; margin-bottom: 8px; }
  .modal p { font-size: 14px; color: var(--muted); margin-bottom: 1.5rem; }
  .modal .big-score { font-family: 'Playfair Display', serif; font-size: 3.5rem; color: var(--gold); line-height: 1; margin-bottom: 4px; }
  .modal .big-label { font-size: 12px; color: var(--muted); margin-bottom: 1.5rem; letter-spacing: 0.06em; text-transform: uppercase; }
  .name-row { display: flex; gap: 8px; margin-bottom: 12px; }
  .name-row input { flex: 1; padding: 9px 12px; border: 1.5px solid var(--border); border-radius: 5px; font-family: 'Inter', sans-serif; font-size: 14px; background: #fff; color: var(--ink); outline: none; }
  .name-row input:focus { border-color: var(--gold); }
  .modal-btns { display: flex; flex-direction: column; gap: 8px; }
  .puzzle-loading { width: 448px; height: 448px; display: flex; align-items: center; justify-content: center; color: var(--muted); font-size: 14px; border: 3px solid var(--border); border-radius: 3px; }
  @media (max-width: 780px) { .container { flex-direction: column; align-items: center; } .right { width: 100%; max-width: 448px; } }
  @media (max-width: 480px) {
    #board { grid-template-columns: repeat(8,44px); grid-template-rows: repeat(8,44px); width: 352px; height: 352px; }
    .sq { width: 44px; height: 44px; font-size: 26px; }
    .file-labels { grid-template-columns: repeat(8,44px); width: 352px; }
    #toast, .btn-row { width: 352px; }
    .puzzle-loading { width: 352px; height: 352px; }
  }
</style>
</head>
<body>

<header>
  <h1>♟ Checkmate Blitz</h1>
  <span>5 minutes · mate in 1</span>
</header>

<div class="container">
  <div class="left">
    <div id="board"></div>
    <div class="file-labels">
      <span>a</span><span>b</span><span>c</span><span>d</span><span>e</span><span>f</span><span>g</span><span>h</span>
    </div>
    <div id="toast">Press <strong>Start Game</strong> to begin!</div>
    <div class="btn-row">
      <button class="btn primary" id="startBtn" onclick="startGame()">Start game</button>
      <button class="btn" id="skipBtn" onclick="skipPuzzle()" disabled>Skip (−10s)</button>
      <button class="btn" id="hintBtn" onclick="showHint()" disabled>Hint</button>
    </div>
  </div>

  <div class="right">
    <div class="stats-grid">
      <div class="stat-card time-card"><div class="label">Time left</div><div class="value" id="timeVal">5:00</div></div>
      <div class="stat-card"><div class="label">Score</div><div class="value" id="scoreVal">0</div></div>
      <div class="stat-card"><div class="label">Streak</div><div class="value" id="streakVal">0</div></div>
      <div class="stat-card"><div class="label">Best ever</div><div class="value" id="bestVal">—</div></div>
    </div>
    <div class="timer-bar-wrap"><div id="timer-bar"></div></div>
    <div>
      <div class="section-title">Leaderboard</div>
      <table class="score-table">
        <thead><tr><th></th><th>Player</th><th>Score</th><th>Date</th></tr></thead>
        <tbody id="sb-body"><tr class="loading-row"><td colspan="4" style="text-align:center;padding:16px;color:var(--muted)">Loading scores…</td></tr></tbody>
      </table>
    </div>
  </div>
</div>

<div id="modal-overlay">
  <div class="modal">
    <div style="font-size:48px;line-height:1;margin-bottom:12px" id="modal-icon">♟</div>
    <h2 id="modal-title">Time's up!</h2>
    <div class="big-score" id="modal-score">0</div>
    <div class="big-label">puzzles solved</div>
    <p id="modal-sub"></p>
    <div class="name-row">
      <input id="nameIn" type="text" placeholder="Your name" maxlength="18" />
      <button class="btn primary" id="saveBtn" onclick="saveScore()">Save</button>
    </div>
    <div class="modal-btns">
      <button class="btn primary" onclick="startGame()">Play again</button>
      <button class="btn" onclick="closeModal()">Close</button>
    </div>
  </div>
</div>

<script>
// ── CONFIG ── fill these in with your own values
const SUPABASE_URL = "https://pkbkdzcoziijcxtfhkuq.supabase.co";
const SUPABASE_ANON_KEY = "sb_publishable_ud8SemqvT3gWfXF3nAK8OQ_RQmuJS5P";
const PROXY_URL = "https://pkbkdzcoziijcxtfhkuq.supabase.co/functions/v1/lichess-proxy";

const PIECES = {K:'♔',Q:'♕',R:'♖',B:'♗',N:'♘',P:'♙',k:'♚',q:'♛',r:'♜',b:'♝',n:'♞',p:'♟'};

const ERROR_MSGS = [
  "Nope! The king laughs at you. −10s",
  "Not quite, grandmaster. −10s",
  "Even the pawns are judging you. −10s",
  "Wrong square! The clock is ticking. −10s",
  "The king escapes! Try again. −10s",
  "A bold move. A wrong move. −10s",
  "The queen refuses that order. −10s",
  "The rook shakes its head. −10s",
  "Close, but no checkmate. −10s",
  "Your bishop wept. −10s",
];

const SKIP_MSGS = [
  "Skipping is for cowards. −10s",
  "Running away? −10s",
  "The puzzle will remember this. −10s",
  "Next puzzle, braver soul. −10s",
];

const SUCCESS_MSGS = [
  "Checkmate! Brilliant!",
  "The king is dead. Long live you.",
  "Flawless. Next!",
  "That's what we're talking about!",
  "Chess mastery detected.",
  "Another king bites the dust.",
  "Yes! Checkmate secured.",
];

const MEDALS = ['♔','♕','♖'];

let chess = null;
let selected = null;
let gameActive = false;
let score = 0;
let streak = 0;
let timeLeft = 300;
let timer = null;
let finalScore = 0;
let hintUsed = false;
let playerColor = 'w';
let correctMove = null;
let puzzleQueue = [];

function rand(arr){ return arr[Math.floor(Math.random()*arr.length)]; }
function fmtTime(s){ return Math.floor(s/60)+':'+(s%60<10?'0':'')+s%60; }

// ── SUPABASE ──
async function sbFetch(path, opts={}){
  const res = await fetch(SUPABASE_URL + path, {
    ...opts,
    headers: {
      apikey: SUPABASE_ANON_KEY,
      Authorization: `Bearer ${SUPABASE_ANON_KEY}`,
      'Content-Type': 'application/json',
      ...(opts.headers||{}),
    }
  });
  return res;
}

async function loadLeaderboard(){
  try {
    const res = await sbFetch('/rest/v1/scores?select=name,score,created_at&order=score.desc&limit=10');
    const data = await res.json();
    renderScoreboard(data);
  } catch(e) {
    document.getElementById('sb-body').innerHTML =
      '<tr><td colspan="4" class="empty">Couldn\'t load scores</td></tr>';
  }
}

async function postScore(name, score){
  await sbFetch('/rest/v1/scores', {
    method: 'POST',
    body: JSON.stringify({ name, score }),
  });
}

function renderScoreboard(scores){
  const tbody = document.getElementById('sb-body');
  if(!scores || !scores.length){
    tbody.innerHTML = '<tr><td colspan="4" class="empty">No scores yet — be the first!</td></tr>';
    return;
  }
  tbody.innerHTML = scores.map((s,i) => `
    <tr class="${i===0?'top':''}">
      <td style="font-size:15px">${MEDALS[i]||i+1}</td>
      <td>${s.name}</td>
      <td>${s.score}</td>
      <td style="color:var(--muted);font-size:12px">${new Date(s.created_at).toLocaleDateString()}</td>
    </tr>
  `).join('');
}

// ── LICHESS PUZZLE FETCHING ──
async function fetchPuzzle(){
  const res = await fetch(PROXY_URL, {
    headers: { apikey: SUPABASE_ANON_KEY }
  });
  if(!res.ok) throw new Error('Failed to fetch puzzle');
  return await res.json();
}

async function prefetchPuzzles(){
  // Keep a small queue of pre-fetched puzzles for instant loading
  while(puzzleQueue.length < 3){
    try {
      const p = await fetchPuzzle();
      puzzleQueue.push(p);
    } catch(e) { break; }
  }
}

// ── BOARD ──
function parseFen(fen){
  const chess = new Chess(fen);
  const board = chess.board();
  return board;
}

function squareToCoords(sq){
  const file = sq.charCodeAt(0) - 97;
  const rank = parseInt(sq[1]) - 1;
  return [rank, file];
}

function coordsToSquare(r, c){
  return String.fromCharCode(97+c) + (r+1);
}

function render(){
  const el = document.getElementById('board');
  el.innerHTML = '';
  const boardArr = chess.board();

  for(let r=7;r>=0;r--){
    for(let c=0;c<8;c++){
      const sq = document.createElement('div');
      sq.className = 'sq '+((r+c)%2===0?'dark':'light');
      sq.dataset.r = r; sq.dataset.c = c;
      const piece = boardArr[7-r][c];
      if(piece) sq.textContent = PIECES[piece.color==='w'?piece.type.toUpperCase():piece.type]||'';
      sq.onclick = ()=>handleClick(r,c);
      if(selected&&selected[0]===r&&selected[1]===c) sq.classList.add('selected');
      el.appendChild(sq);
    }
  }
}

function toast(msg, cls=''){
  const t = document.getElementById('toast');
  t.innerHTML = msg;
  t.className = cls;
}

async function loadPuzzle(){
  toast('Loading puzzle…');
  document.getElementById('board').style.opacity = '0.5';

  try {
    let puzzleData;
    if(puzzleQueue.length > 0){
      puzzleData = puzzleQueue.shift();
    } else {
      puzzleData = await fetchPuzzle();
    }
    prefetchPuzzles(); // replenish queue in background

    // Lichess puzzle format:
    // puzzle.fen = position BEFORE opponent's move
    // puzzle.moves = [opponent_move, correct_player_move, ...]
    // For mateIn1: moves[0] is opponent's setup move, moves[1] is the mate
    const fen = puzzleData.puzzle.fen;
    const moves = puzzleData.puzzle.moves;

    chess = new Chess(fen);
    // Play the opponent's first move to reach the puzzle position
    chess.move(moves[0], { sloppy: true });

    // The correct answer is moves[1]
    correctMove = moves[1]; // UCI format e.g. "e2e4"
    playerColor = chess.turn();
    selected = null;
    hintUsed = false;

    document.getElementById('board').style.opacity = '1';
    render();
    toast('Find the checkmate in 1!');
  } catch(e) {
    toast('Failed to load puzzle — retrying…', 'bad');
    document.getElementById('board').style.opacity = '1';
    setTimeout(loadPuzzle, 2000);
  }
}

function handleClick(r, c){
  if(!gameActive||!chess) return;

  const sqName = coordsToSquare(r, c);
  const boardArr = chess.board();
  const piece = boardArr[7-r][c];

  if(selected){
    const [sr, sc] = selected;
    const fromSq = coordsToSquare(sr, sc);
    const toSq = sqName;
    const uciMove = fromSq + toSq;

    // Check if this matches the correct move (handle promotion)
    if(uciMove === correctMove || uciMove === correctMove.slice(0,4)){
      // Validate with chess.js
      const result = chess.move({ from: fromSq, to: toSq, promotion: 'q' });
      if(result && chess.in_checkmate()){
        score++; streak++;
        document.getElementById('scoreVal').textContent = score;
        document.getElementById('streakVal').textContent = streak;
        toast(rand(SUCCESS_MSGS), 'good');
        selected = null;
        render();
        setTimeout(loadPuzzle, 800);
        return;
      }
    }

    // Wrong move — but was it a valid piece selection?
    if(piece && piece.color === playerColor){
      selected = [r, c];
      render();
    } else {
      penalty();
    }
  } else {
    if(piece && piece.color === playerColor){
      selected = [r, c];
      render();
    }
  }
}

function penalty(){
  timeLeft = Math.max(0, timeLeft-10);
  streak = 0;
  document.getElementById('streakVal').textContent = 0;
  toast(rand(ERROR_MSGS), 'bad');
  selected = null;
  render();
  updateTimerDisplay();
}

function showHint(){
  if(!correctMove||hintUsed) return;
  const fromSq = correctMove.slice(0,2);
  const [fr, fc] = squareToCoords(fromSq);
  document.querySelectorAll('.sq').forEach(sq=>{
    if(+sq.dataset.r===fr&&+sq.dataset.c===fc) sq.classList.add('hint-sq');
  });
  hintUsed = true;
  toast('Hint: move the highlighted piece');
}

function skipPuzzle(){
  if(!gameActive) return;
  timeLeft = Math.max(0, timeLeft-10);
  streak = 0;
  document.getElementById('streakVal').textContent = 0;
  toast(rand(SKIP_MSGS), 'bad');
  updateTimerDisplay();
  setTimeout(loadPuzzle, 400);
}

function updateTimerDisplay(){
  document.getElementById('timeVal').textContent = fmtTime(timeLeft);
  const pct = (timeLeft/300)*100;
  const bar = document.getElementById('timer-bar');
  bar.style.width = pct+'%';
  bar.style.background = timeLeft<=30 ? '#C0392B' : '#C8973A';
}

async function startGame(){
  score=0; timeLeft=300; gameActive=true; streak=0; finalScore=0;
  ['scoreVal','streakVal'].forEach(id=>document.getElementById(id).textContent='0');
  document.getElementById('timeVal').textContent='5:00';
  document.getElementById('startBtn').disabled=true;
  document.getElementById('startBtn').textContent='Playing…';
  document.getElementById('skipBtn').disabled=false;
  document.getElementById('hintBtn').disabled=false;
  document.getElementById('timer-bar').style.width='100%';
  document.getElementById('modal-overlay').classList.remove('show');

  clearInterval(timer);
  await loadPuzzle();

  timer = setInterval(()=>{
    timeLeft--;
    updateTimerDisplay();
    if(timeLeft<=0){ clearInterval(timer); endGame(); }
  }, 1000);
}

function endGame(){
  gameActive=false; finalScore=score;
  document.getElementById('skipBtn').disabled=true;
  document.getElementById('hintBtn').disabled=true;
  document.getElementById('startBtn').disabled=false;
  document.getElementById('startBtn').textContent='Play again';

  document.getElementById('modal-icon').textContent = score>=20?'♔':'♟';
  document.getElementById('modal-title').textContent = score>=20?'Impressive!':'Time\'s up!';
  document.getElementById('modal-score').textContent = score;
  document.getElementById('modal-sub').textContent =
    score===0 ? 'No checkmates this time. The king survives… for now.' :
    score<5   ? 'A humble start. The board is a cruel teacher.' :
    score<15  ? `${score} checkmates! Your father would be proud.` :
                `${score} puzzles — you're a menace to kings everywhere.`;
  document.getElementById('nameIn').value='';
  document.getElementById('modal-overlay').classList.add('show');
}

async function saveScore(){
  const name = document.getElementById('nameIn').value.trim()||'Anonymous';
  document.getElementById('saveBtn').disabled=true;
  document.getElementById('saveBtn').textContent='Saving…';
  try {
    await postScore(name, finalScore);
    await loadLeaderboard();
  } catch(e) { console.error(e); }
  document.getElementById('saveBtn').disabled=false;
  document.getElementById('saveBtn').textContent='Save';
  closeModal();
}

function closeModal(){
  document.getElementById('modal-overlay').classList.remove('show');
}

// Init
loadLeaderboard();
prefetchPuzzles();
</script>
</body>
</html>
